<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>calvinitofjrzk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #050505;
      --card: #0f0f0f;
      --text: #ffffff;
      --muted: #b8b8b8;
      --line: rgba(255,255,255,0.08);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* NAVBAR */

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(18px);
      background: rgba(5,5,5,0.45);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* HAMBURGER */

    .hamburger {
      width: 56px;
      height: 56px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.4s cubic-bezier(.77,0,.18,1);
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .hamburger::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
      opacity: 0;
      transition: 0.3s;
    }

    .hamburger:hover::before {
      opacity: 1;
    }

    .hamburger span {
      position: absolute;
      width: 24px;
      height: 2px;
      background: white;
      border-radius: 100px;
      transition: 0.45s cubic-bezier(.77,0,.18,1);
    }

    .hamburger span:nth-child(1) {
      transform: translateY(-7px);
    }

    .hamburger span:nth-child(3) {
      transform: translateY(7px);
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg);
    }

    /* MENU */

    .menu {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      background: rgba(5,5,5,0.96);
      backdrop-filter: blur(30px);
      z-index: 999;
      padding: 140px 30px;
      transition: 0.5s cubic-bezier(.77,0,.18,1);
      opacity: 0;
      visibility: hidden;
      transform: scale(1.05);
    }

    .menu.active {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .menu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      text-decoration: none;
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 24px;
      padding: 20px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      transform: translateY(30px);
      transition: 0.5s cubic-bezier(.77,0,.18,1);
    }

    .menu.active a {
      opacity: 1;
      transform: translateY(0);
    }

    .menu.active a:nth-child(1) { transition-delay: 0.08s; }
    .menu.active a:nth-child(2) { transition-delay: 0.14s; }
    .menu.active a:nth-child(3) { transition-delay: 0.20s; }
    .menu.active a:nth-child(4) { transition-delay: 0.26s; }

    /* GRID */

    .gallery {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      margin-top: 82px;
    }

    .photo {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1/1.4;
      background: #111;
    }

    .photo.large {
      grid-column: span 2;
      aspect-ratio: 1/1;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s ease;
    }

    .photo:hover img {
      transform: scale(1.04);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 55%);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      opacity: 0;
      transition: 0.4s ease;
    }

    .photo:hover .overlay {
      opacity: 1;
    }

    .overlay h3 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* FOOTER */ */

    footer {
      padding: 45px 20px 60px;
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      letter-spacing: 1px;
      background: #050505;
    }

    /* MOBILE */

    @media(max-width: 480px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .menu a {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->

  <nav class="navbar">
    <div class="logo">calvinitofjrzk</div>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- MENU -->

  <div class="menu" id="menu">
    <a href="#street">Street <span>↗</span></a>

  <!-- GALLERY -->

    <div class="photo">
      <img src="https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1000&auto=format&fit=crop" alt="">

        <h3>City Lights</h3>
      </div>
    </div>

    <div class="photo">

      <div class="overlay">

    </div>

      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1000&auto=format&fit=crop" alt="">

        <h3>Portrait Mood</h3>
      </div>
    </div>

    <div class="photo large">
      <img src="https://images.unsplash.com/photo-1521119989659-a83eee488004?q=80&w=1200&auto=format&fit=crop" alt="">
      <div class="overlay">

    <div id="nature"></div>

      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000&auto=format&fit=crop" alt="">
      <div class="overlay">
        <h3>Forest Calm</h3>
      </div>
    </div>

    <div class="photo large">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1200&auto=format&fit=crop" alt="">
      <div class="overlay">
        <h3>Ocean Horizon</h3>
      </div>
    </div>

  </section>

  <footer id="contact">
    © 2026 CALVINITOFJRZK — MOBILE PHOTOGRAPHY PORTFOLIO
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const menu = document.getElementById('menu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      menu.classList.toggle('active');
    });

    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
      });
    });
  </script>

</body>
</html>
