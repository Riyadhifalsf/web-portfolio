<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>calvinitofjrzk</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* ===== GALLERY ===== */

.gallery{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:0;
}

.gallery-item{
    position:relative;
    overflow:hidden;
}

.gallery img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.5s ease;
}

.gallery-item:hover img{
    transform:scale(1.06);
    filter:brightness(.9);
}

/* ===== CUSTOM SIZE ===== */

.tall{
    grid-row:span 2;
}

.wide{
    grid-column:span 2;
}

/* ===== PAGINATION ===== */

.pagination{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:28px 0 100px;
    background:#000;
}

.pagination a{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#fff;
    border:1px solid rgba(255,255,255,.12);
    background:#111;
    transition:.3s;
    font-size:14px;
}

.pagination a:hover{
    background:#fff;
    color:#000;
    transform:translateY(-4px);
}

.pagination a.active{
    background:#fff;
    color:#000;
    font-weight:600;
}

/* ===== BOTTOM NAV ===== */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(16px);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid rgba(255,255,255,.08);
    z-index:999;
}

.bottom-nav a{
    text-decoration:none;
    color:#8a8a8a;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:11px;
    transition:.3s;
}

.bottom-nav a svg{
    width:22px;
    height:22px;
    margin-bottom:4px;
}

.bottom-nav a:hover,
.bottom-nav a.active{
    color:#fff;
    transform:translateY(-2px);
}

/* ===== SCROLL TO TOP ===== */

.scroll-top{
    position:fixed;
    right:18px;
    bottom:90px;
    width:52px;
    height:52px;
    border-radius:50%;
    background:#fff;
    color:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    box-shadow:0 10px 30px rgba(255,255,255,.15);
    z-index:999;
    opacity:0;
    visibility:hidden;
    transform:translateY(30px);
    transition:.4s ease;
    animation:float 2s ease-in-out infinite;
}

.scroll-top.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.scroll-top svg{
    width:24px;
    height:24px;
}

/* ===== FLOAT ANIMATION ===== */

@keyframes float{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-6px);
    }
    100%{
        transform:translateY(0);
    }
}

/* ===== MOBILE ===== */

@media(max-width:600px){

    .gallery{
        grid-template-columns:1fr;
    }

    .wide{
        grid-column:span 1;
    }

    .tall{
        grid-row:span 1;
    }

}

</style>
</head>

<body id="top">

<!-- GALLERY -->

<section class="gallery">

<script>

const scrollTopBtn = document.getElementById('scrollTop');

window.addEventListener('scroll', () => {

    if(window.scrollY > 300){
        scrollTopBtn.classList.add('show');
    } else {
        scrollTopBtn.classList.remove('show');
    }

});

</script>
